{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">Items</h1>
    <div class="row">
        {% for item in items %}
        <div class="col-md-4 mb-3">
            {% include 'items/item_card.html' with item=item link_to_detail=True %}
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
