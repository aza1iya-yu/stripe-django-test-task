{% load django_bootstrap5 %}

<div class="card mb-3" style="width: 18rem;">
    <div class="card-body">
        <h5 class="card-title">
            {% if link_to_detail %}
                <a href="{% url 'item_detail' item.pk %}" class="text-decoration-none">{{ item.name }}</a>
            {% else %}
                {{ item.name }}
            {% endif %}
        </h5>
        <p class="card-text">{{ item.description }}</p>
        <p class="card-text fw-bold">{{ item.price }} {% if item.currency == 'eur' %} € {% else %} $ {% endif %}</p>
        <button class="btn btn-primary buy-button" data-item-id="{{ item.pk }}">Buy</button>
        <div class="mb-2">
            <label for="quantity-{{ item.pk }}">Quantity:</label>
            <input type="number" 
                   id="quantity-{{ item.pk }}" 
                   class="form-control quantity-input" 
                   step="1" 
                   min="1" 
                   max="{{ item.stock }}" 
                   value="1">
        </div>
        <button class="btn btn-primary add-order-button" data-item-id="{{ item.pk }}">Add to order</button>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function() {        
        document.querySelectorAll('.buy-button').forEach(function(button) {
            button.addEventListener('click', function() {
                var itemId = this.dataset.itemId;
                fetch(`/buy/${itemId}/`)
                    .then(response => response.json())
                    .then(session => window.location.href = session.session_url);
            });
        });

        document.querySelectorAll('.add-order-button').forEach(function(button) {
            button.addEventListener('click', function() {
                var itemId = this.dataset.itemId;

                var quantityInput = document.getElementById('quantity-' + itemId);
                var quantity = quantityInput ? parseInt(quantityInput.value) : 1;
                
                var maxStock = parseInt(quantityInput.max);
                if (quantity < 1) quantity = 1;
                if (quantity > maxStock) quantity = maxStock;
                
                fetch(`/order/add/${itemId}/`, {
                    method: 'POST',
                    body: JSON.stringify({
                        quantity: quantity
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.total_quantity) {
                        var cartCount = document.getElementById('cart-count');
                        cartCount.textContent = data.total_quantity;
                    }
                });
            });
        });
    });
</script>
